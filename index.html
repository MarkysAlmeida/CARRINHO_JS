<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho de Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Carrinho de Produtos</h1>

        <!-- Cadastro do Produto -->
        <div class="form-section">
            <h2>Cadastro de Produto</h2>

            <div class="form-group">
                <label for="nomeProduto">Nome do Produto</label>
                <input type="text" id="nomeProduto" placeholder="Digite o nome do produto">
            </div>

            <div class="form-group">
                <label for="valorProduto">Valor (R$)</label>
                <input type="number" id="valorProduto" step="0.01" placeholder="0.00">
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="temDesconto">
                <label for="temDesconto">Produto elegível para desconto</label>
            </div>

            <button id="btnAdicionar" onclick="adicionarProduto()">Adicionar Produto</button>
        </div>

        <!-- Lista de Produtos -->
        <div class="lista-section">
            <h2>Produtos Adicionados</h2>

            <ul id="listaProdutos">
                <!-- JS vai inserir os produtos aqui -->
                <ul id="listaProdutos">
                    <!--
                    <li>
                        <span class="produto-nome">Arroz</span>
                        <span class="produto-valor">R$ 25,90</span>
                        <span class="produto-desconto">Desconto: Sim</span>
                    </li>
                    -->
                </ul>
                
            </ul>
        </div>

        <!-- Resumo -->
        <div class="resumo-section">
            <h2>Resumo</h2>

            <div class="resumo-item">
                <span>Subtotal:</span>
                <span id="subtotal">R$ 0,00</span>
            </div>

            <div class="resumo-item">
                <span>Desconto:</span>
                <span id="desconto">R$ 0,00</span>
            </div>

            <div class="resumo-item total">
                <span>Total:</span>
                <span id="total">R$ 0,00</span>
            </div>
        </div>

    </div>
    <script src="script.js"></script>

</body>
</html>
